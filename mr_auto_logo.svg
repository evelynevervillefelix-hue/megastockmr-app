<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cercle de fond -->
  <circle cx="100" cy="100" r="95" fill="#b71c1c" stroke="#23272b" stroke-width="3"/>
  
  <!-- Voiture simplifiée -->
  <g transform="translate(100, 100)">
    <!-- Carrosserie -->
    <rect x="-50" y="-20" width="100" height="35" rx="5" fill="#fff" stroke="#23272b" stroke-width="2"/>
    
    <!-- Toit -->
    <polygon points="-30,-20 30,-20 20,-40 -20,-40" fill="#fff" stroke="#23272b" stroke-width="2"/>
    
    <!-- Fenêtres -->
    <rect x="-25" y="-35" width="15" height="12" fill="#87ceeb" stroke="#23272b" stroke-width="1"/>
    <rect x="10" y="-35" width="15" height="12" fill="#87ceeb" stroke="#23272b" stroke-width="1"/>
    
    <!-- Roues -->
    <circle cx="-35" cy="20" r="12" fill="#23272b" stroke="#b71c1c" stroke-width="2"/>
    <circle cx="35" cy="20" r="12" fill="#23272b" stroke="#b71c1c" stroke-width="2"/>
    
    <!-- Jantes -->
    <circle cx="-35" cy="20" r="7" fill="none" stroke="#fff" stroke-width="1.5"/>
    <circle cx="35" cy="20" r="7" fill="none" stroke="#fff" stroke-width="1.5"/>
    
    <!-- Phares -->
    <circle cx="-48" cy="-8" r="4" fill="#ffff00" stroke="#23272b" stroke-width="1"/>
    <circle cx="48" cy="-8" r="4" fill="#ffff00" stroke="#23272b" stroke-width="1"/>
  </g>
  
  <!-- Texte -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#23272b">MR AUTO</text>
</svg>
